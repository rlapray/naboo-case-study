pre-commit:
  parallel: true
  commands:
    front-verify:
      root: front-end/
      glob: "front-end/**/*.{ts,tsx,js,jsx}"
      run: npm run verify
      stage_fixed: true
    front-test:
      root: front-end/
      glob: "front-end/**/*.{ts,tsx,js,jsx}"
      run: npm run verify:test
    back-verify:
      root: back-end/
      glob: "back-end/**/*.{ts,js}"
      run: npm run verify
      stage_fixed: true
    back-test:
      root: back-end/
      glob: "back-end/**/*.{ts,js}"
      run: npm run verify:test

pre-push:
  commands:
    front-e2e:
      root: front-end/
      run: npm run e2e
